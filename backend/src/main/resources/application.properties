# Application Name
spring.application.name=mazebank

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/mazebank_database?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=6969

# JWT Configuration
jwt.secret=MazeBankSecretKeyForJWTTokenGeneration2024VeryLongSecretKey123456789
jwt.expiration=86400000

